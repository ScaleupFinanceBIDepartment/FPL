name: Terminal data refresh

# Rebuilds terminal/data.json from the public FPL Draft API (league 56144)
# and commits it. Weekly cron + manual run. No auth/secrets needed.

on:
  schedule:
    - cron: "23 6 * * 1"   # Mondays 06:23 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: terminal-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build terminal/data.json
        run: python terminal/build_data.py
      - name: Commit if changed
        run: |
          git config user.name "fpl-terminal-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terminal/data.json
          if git diff --cached --quiet; then
            echo "No data change."
          else
            git commit -m "chore(terminal): refresh data.json [skip ci]"
            git push
          fi
