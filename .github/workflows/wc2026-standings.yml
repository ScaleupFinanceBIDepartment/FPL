name: WC2026 standings & stats

# Bygger leaderboards (stats.json, offentlige feeds) og henter SuF-ligaens
# stilling fra FIFA (kræver bot-login), og committer begge filer.
# Kører på skema (hver 3. time) + kan startes manuelt.
# NB: schedule-triggere kører fra default-branchen (main) — indtil dette er
# merget til main, brug "Run workflow" (workflow_dispatch) på feature-branchen.

on:
  schedule:
    - cron: "7 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wc2026-standings
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FIFA_COOKIE: ${{ secrets.FIFA_COOKIE }}
      FIFA_EMAIL: ${{ secrets.FIFA_EMAIL }}
      FIFA_PASSWORD: ${{ secrets.FIFA_PASSWORD }}
      FIFA_LEAGUE_ID: "128462"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Install Playwright (only if email login is configured)
        if: ${{ env.FIFA_EMAIL != '' }}
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Build leaderboards (stats.json, public feeds)
        run: python wc2026/build_stats.py

      - name: Fetch standings (requires bot login)
        continue-on-error: true
        run: python wc2026/fetch_standings.py

      - name: Commit data if changed
        run: |
          git config user.name "wc2026-standings-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wc2026/standings.json wc2026/stats.json
          if git diff --cached --quiet; then
            echo "No data change."
          else
            git commit -m "chore(wc2026): update standings & stats [skip ci]"
            git push
          fi
