<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WC2026 Fantasy Terminal · SuF</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* WC2026 FANTASY TERMINAL — near-black · IBM Plex Mono · teal/amber/green */
  :root{
    --bg:#060D0B; --bg-2:#07100E; --panel:#0A1614; --panel-2:#0C1B18;
    --line:rgba(96,222,200,0.13); --line-2:rgba(255,255,255,0.05);
    --teal:#60DEC8; --teal-dk:#2E8B7C; --amber:#F2B33D; --green:#3DE08A;
    --red:#FF6B5B; --violet:#B79BFF; --txt:#C2D6CF; --txt-hi:#EAF7F2;
    --dim:#5E7C75; --dim-2:#3E534E; --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:13px;-webkit-font-smoothing:antialiased}
  a{color:var(--teal)}
  ::selection{background:var(--teal);color:#04211c}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-track{background:var(--bg-2)}
  ::-webkit-scrollbar-thumb{background:#173029}
  ::-webkit-scrollbar-thumb:hover{background:#1f463c}

  .app{display:grid;grid-template-rows:auto 1fr auto;height:100vh;min-height:0}

  /* status bar */
  .statusbar{display:flex;align-items:center;gap:18px;padding:0 16px;height:38px;background:#040A08;border-bottom:1px solid var(--line);white-space:nowrap;overflow:hidden}
  .sb-brand{color:var(--teal);font-weight:600;letter-spacing:.04em}
  .sb-brand b{color:var(--txt-hi)}
  .sb-seg{color:var(--dim);font-size:12px}
  .sb-seg b{color:var(--txt);font-weight:500}
  .sb-live{color:var(--green);display:flex;align-items:center;gap:6px;font-size:12px}
  .dotpulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .sb-ticker{margin-left:auto;color:var(--dim);font-size:12px;-webkit-mask-image:linear-gradient(90deg,transparent,#000 40px);max-width:46%;overflow:hidden}
  .sb-ticker .sep{color:var(--dim-2);margin:0 10px}
  .sb-clock{color:var(--amber);font-size:12px}

  /* body layout */
  .body{display:grid;grid-template-columns:236px 1fr;min-height:0}
  .rail{background:var(--bg-2);border-right:1px solid var(--line);padding:14px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
  .rail-h{color:var(--dim-2);font-size:10px;letter-spacing:.22em;text-transform:uppercase;padding:14px 10px 6px}
  .navitem{display:flex;align-items:center;gap:11px;padding:9px 11px;color:var(--dim);cursor:pointer;border:1px solid transparent;border-left:2px solid transparent;transition:background .12s,color .12s;user-select:none}
  .navitem:hover{background:var(--panel);color:var(--txt)}
  .navitem.on{background:var(--panel-2);color:var(--teal);border-left-color:var(--teal)}
  .navitem .k{width:16px;color:var(--dim-2);font-size:11px}
  .navitem.on .k{color:var(--teal-dk)}
  .navitem .lbl{flex:1;letter-spacing:.02em}
  .navitem .cnt{color:var(--dim-2);font-size:11px}
  .rail-stat{margin-top:auto;padding:12px 11px;border-top:1px solid var(--line)}
  .rail-stat .row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;color:var(--dim)}
  .rail-stat .row b{color:var(--teal);font-weight:500}

  .view{min-height:0;overflow-y:auto;padding:18px 20px 28px}

  /* panels */
  .panel{background:var(--panel);border:1px solid var(--line);margin-bottom:16px}
  .panel-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line)}
  .panel-h .t{color:var(--amber);letter-spacing:.14em;text-transform:uppercase;font-size:11px}
  .panel-h .tag{color:var(--dim);font-size:11px}

  /* leader strip */
  .leadstrip{display:flex;align-items:stretch;gap:0;background:linear-gradient(90deg,var(--panel-2),var(--panel));border:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
  .leadcell{padding:14px 20px;border-right:1px solid var(--line)}
  .leadcell .lab{color:var(--dim);font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px}
  .leadcell .big{color:var(--teal);font-size:30px;font-weight:600;line-height:1}
  .leadcell .nm{color:var(--txt-hi);font-size:17px}
  .leadcell .sub{color:var(--dim);font-size:12px}
  .leadcell .up{color:var(--green)}

  /* tables */
  .tbl{width:100%;border-collapse:collapse}
  .tbl th{color:var(--dim);font-weight:400;text-align:right;padding:8px 10px;font-size:11px;letter-spacing:.04em;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;background:var(--panel)}
  .tbl th.l{text-align:left}
  .tbl td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--line-2);white-space:nowrap}
  .tbl td.l{text-align:left}
  .tbl tbody tr{transition:background .1s}
  .tbl tbody tr:hover{background:rgba(96,222,200,0.06)}
  .c-rk{color:var(--amber)} .c-nm{color:var(--txt-hi)} .c-dim{color:var(--dim)}
  .c-tot{color:var(--teal);font-weight:600;font-size:14px} .c-amber{color:var(--amber)}
  .pos{display:inline-block;padding:1px 6px;font-size:10px;letter-spacing:.06em;border:1px solid}
  .pos.GK{color:var(--amber);border-color:rgba(242,179,61,.4)}
  .pos.DEF{color:var(--green);border-color:rgba(61,224,138,.4)}
  .pos.MID{color:var(--teal);border-color:rgba(96,222,200,.4)}
  .pos.FWD{color:var(--red);border-color:rgba(255,107,91,.4)}

  /* team (nation) picker */
  .natpick{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
  .grp{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .grp-l{color:var(--dim-2);font-size:10px;letter-spacing:.14em;width:78px;flex:none}
  .natchip{padding:4px 9px;border:1px solid var(--line);color:var(--dim);cursor:pointer;font-size:12px;transition:.12s;user-select:none}
  .natchip:hover{color:var(--txt);border-color:var(--teal-dk)}
  .natchip.on{background:var(--panel-2);color:var(--teal);border-color:var(--teal)}
  .natchip.elim{text-decoration:line-through;opacity:.45}

  .empty{padding:22px;text-align:center;color:var(--dim);font-size:13px;background:var(--bg-2);border:1px solid var(--line)}
  .err{color:var(--red);padding:16px}
  .skel{color:var(--dim);font-size:13px;padding:16px}

  /* footer cmd bar */
  .cmdbar{display:flex;align-items:center;gap:16px;padding:0 16px;height:30px;background:#040A08;border-top:1px solid var(--line);color:var(--dim-2);font-size:11px;overflow:hidden;white-space:nowrap}
  .cmdbar .key{color:var(--dim)} .cmdbar .key b{color:var(--teal);font-weight:500}
  .cmdbar .right{margin-left:auto;color:var(--dim-2)}
</style>
</head>
<body>
<div class="app">
  <div class="statusbar">
    <span class="sb-brand">WC2026://<b>FANTASY.TERMINAL</b></span>
    <span class="sb-seg">LEAGUE <b id="sbLeague">SuF</b></span>
    <span class="sb-live"><span class="dotpulse"></span>LIVE</span>
    <span class="sb-seg"><b id="sbMatches">—</b> matches</span>
    <span class="sb-ticker" id="ticker"></span>
    <span class="sb-clock" id="clock"></span>
  </div>
  <div class="body">
    <div class="rail">
      <div class="rail-h">Views</div>
      <div id="nav"></div>
      <div class="rail-stat" id="railStat"></div>
    </div>
    <div class="view" id="view"><div class="skel">Loading…</div></div>
  </div>
  <div class="cmdbar">
    <span class="key"><b>1</b> standings</span>
    <span class="key"><b>2</b> scorers</span>
    <span class="key"><b>3</b> assists</span>
    <span class="key"><b>4</b> points</span>
    <span class="key"><b>5</b> selected</span>
    <span class="key"><b>6</b> teams</span>
    <span class="right" id="cmdRight">WC2026 FANTASY TERMINAL · SuF</span>
  </div>
</div>

<script>
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const posTag = p => p?`<span class="pos ${p}">${p}</span>`:'';
function fmtDate(iso){ if(!iso) return '—'; try{return new Date(iso).toLocaleString('en-GB',{dateStyle:'short',timeStyle:'short'});}catch{return iso;} }

const VIEWS = [
  {id:'standings',    k:'1', label:'STANDINGS'},
  {id:'topScorers',   k:'2', label:'TOP SCORERS',   cols:[['goals','Goals'],['assists','Assists']]},
  {id:'topAssists',   k:'3', label:'ASSISTS',       cols:[['assists','Assists'],['goals','Goals']]},
  {id:'topPoints',    k:'4', label:'POINTS',        cols:[['points','Pts'],['avg','Avg'],['form','Form']]},
  {id:'mostSelected', k:'5', label:'MOST SELECTED', cols:[['ownPct','Own%'],['points','Pts']]},
  {id:'teams',        k:'6', label:'TEAMS'},
];

let STATS=null, STAND=null, view='standings', selNation=null;

async function loadJSON(path){
  const r = await fetch(path + '?t=' + Date.now());
  if(!r.ok) throw new Error(path+': HTTP '+r.status);
  return r.json();
}

/* ---------- live stats from FIFA's public feeds ---------- */
const FIFA_FEEDS='https://play.fifa.com/json/fantasy/';
const TOP_N=25;
const pname=p=>p.knownName||`${p.firstName||''} ${p.lastName||''}`.trim();
async function feed(n){const r=await fetch(FIFA_FEEDS+n+'.json');if(!r.ok)throw new Error(n+' HTTP '+r.status);return r.json();}
function topBy(rows,key,tiebreak,extra){
  return rows.filter(r=>(r[key]||0)>0)
    .sort((a,b)=>(b[key]-a[key])||((b[tiebreak]||0)-(a[tiebreak]||0)))
    .slice(0,TOP_N)
    .map(r=>{const o={id:r.id,name:r.name,nation:r.nation,nationAbbr:r.nationAbbr,group:r.group,pos:r.pos};
      extra.forEach(k=>o[k]=r[k]);return o;});
}
async function buildStatsLive(){
  const [players,squads,rounds]=await Promise.all([feed('players'),feed('squads'),feed('rounds')]);
  const sq={};squads.forEach(s=>sq[s.id]=s);
  const goals={},assists={};let played=0;
  rounds.forEach(rnd=>(rnd.tournaments||[]).forEach(m=>{
    if(m.homeScore==null&&m.awayScore==null)return;played++;
    ['homeGoalScorersAssists','awayGoalScorersAssists'].forEach(side=>(m[side]||[]).forEach(ev=>{
      if(ev.playerId)goals[ev.playerId]=(goals[ev.playerId]||0)+1;
      if(ev.assistId)assists[ev.assistId]=(assists[ev.assistId]||0)+1;
    }));
  }));
  const rows=players.filter(p=>p.status==='playing').map(p=>{
    const s=sq[p.squadId]||{},st=p.stats||{};
    return{id:p.id,squadId:p.squadId,name:pname(p),nation:s.name,nationAbbr:s.abbr,group:(s.group||'').toUpperCase(),
      pos:p.position,price:p.price,points:st.totalPoints||0,avg:st.avgPoints||0,form:st.form||0,
      ownPct:Math.round((p.percentSelected||0)*10)/10,goals:goals[p.id]||0,assists:assists[p.id]||0};
  });
  const nations=squads.map(s=>({id:s.id,name:s.name,abbr:s.abbr,group:(s.group||'').toUpperCase(),
    eliminated:!!s.isEliminated})).sort((a,b)=>(a.group+a.name).localeCompare(b.group+b.name));
  return{meta:{league:{id:128462,name:'SuF',joinCode:'2SPXEBAF'},generatedAt:new Date().toISOString(),
      dataSource:FIFA_FEEDS+'*',playerCount:rows.length,matchesPlayed:played,
      note:played?`${played} matches played — live from FIFA.`:'Tournament has not started yet.'},
    leaderboards:{
      topScorers:topBy(rows,'goals','assists',['goals','assists']),
      topAssists:topBy(rows,'assists','goals',['assists','goals']),
      topPoints:topBy(rows,'points','avg',['points','avg','form']),
      mostSelected:topBy(rows,'ownPct','points',['ownPct','points'])},
    players:rows, nations};
}

/* ---------- render ---------- */
function renderChrome(){
  const m=STATS.meta;
  document.getElementById('sbLeague').textContent=m.league.name;
  document.getElementById('sbMatches').textContent=m.matchesPlayed??0;
  document.getElementById('cmdRight').textContent=
    `WC2026 FANTASY TERMINAL · ${m.league.name} · ${m.playerCount} players · updated ${fmtDate(m.generatedAt)}`;
  const ts=(STATS.leaderboards.topScorers||[]).slice(0,4).map(p=>`${p.name.toUpperCase()} ${p.goals}⚽`);
  document.getElementById('ticker').innerHTML = ts.length
    ? ts.map(t=>`<span>${esc(t)}</span>`).join('<span class="sep">·</span>') : '';
}
function renderNav(){
  document.getElementById('nav').innerHTML = VIEWS.map(v=>{
    const cnt = v.id==='standings' ? (STAND?.entries?.length||'')
      : v.id==='teams' ? (STATS.nations?.length||'')
      : (STATS.leaderboards[v.id]?.length||'');
    return `<div class="navitem${v.id===view?' on':''}" data-id="${v.id}">
      <span class="k">${v.k}</span><span class="lbl">${v.label}</span><span class="cnt">${cnt}</span></div>`;
  }).join('');
  document.querySelectorAll('#nav .navitem').forEach(n=>n.onclick=()=>setView(n.dataset.id));
  const m=STATS.meta;
  document.getElementById('railStat').innerHTML = [
    ['league', m.league.name], ['league id', m.league.id], ['join code', m.league.joinCode],
    ['matches played', m.matchesPlayed??0], ['players', m.playerCount],
  ].map(([k,v])=>`<div class="row"><span>${k}</span><b>${esc(v)}</b></div>`).join('');
}
function setView(id){ view=id; renderNav(); renderMain(); }

function renderMain(){
  const el=document.getElementById('view');
  if(view==='standings') return renderStandings(el);
  if(view==='teams') return renderTeams(el);
  const cfg=VIEWS.find(v=>v.id===view);
  const rows=STATS.leaderboards[cfg.id]||[];
  if(!rows.length){ el.innerHTML=`<div class="empty">No data yet — ${esc(STATS.meta.note)}</div>`; return; }
  const head=`<th class="l">#</th><th class="l">Player</th><th class="l">Pos</th><th class="l">Nation</th>`
    + cfg.cols.map(c=>`<th>${c[1]}</th>`).join('');
  el.innerHTML=`<div class="panel"><div class="panel-h"><span class="t">${cfg.label}</span>
      <span class="tag">${cfg.cols[0][1]} ▼ · top ${rows.length}</span></div>
    <table class="tbl"><thead><tr>${head}</tr></thead><tbody>`
    + rows.map((r,i)=>{
        const cells=cfg.cols.map((c,ci)=>{let v=r[c[0]];if(v==null)v='—';if(c[0]==='ownPct')v=v+'%';
          return `<td class="${ci===0?'c-tot':'c-dim'}">${v}</td>`;}).join('');
        return `<tr><td class="l c-rk">${String(i+1).padStart(2,'0')}</td>
          <td class="l c-nm">${esc(r.name)}</td>
          <td class="l">${posTag(r.pos)}</td>
          <td class="l c-dim">${esc(r.nationAbbr||r.nation)}${r.group?' · '+r.group:''}</td>
          ${cells}</tr>`;
      }).join('') + `</tbody></table></div>`;
}

function renderTeams(el){
  const nations=STATS.nations||[];
  if(!nations.length || !STATS.players){ el.innerHTML=`<div class="empty">Team data unavailable (offline snapshot — open online for live FIFA data).</div>`; return; }
  if(!selNation || !nations.some(n=>n.id===selNation)) selNation=nations[0].id;
  const byGroup={}; nations.forEach(n=>{(byGroup[n.group]=byGroup[n.group]||[]).push(n);});
  const chips=Object.keys(byGroup).sort().map(g=>`<div class="grp"><span class="grp-l">GROUP ${g||'—'}</span>`
    + byGroup[g].map(n=>`<span class="natchip${n.id===selNation?' on':''}${n.eliminated?' elim':''}" data-id="${n.id}" title="${esc(n.name)}">${esc(n.abbr||n.name)}</span>`).join('')
    + `</div>`).join('');
  const nat=nations.find(n=>n.id===selNation);
  const squad=STATS.players.filter(p=>p.squadId===nat.id).sort((a,b)=>(b.points-a.points)||(b.price-a.price));
  const totalPts=squad.reduce((s,p)=>s+(p.points||0),0);
  el.innerHTML=`<div class="natpick">${chips}</div>
    <div class="panel"><div class="panel-h"><span class="t">${esc(nat.name)} · Group ${nat.group}${nat.eliminated?' · ELIMINATED':''}</span>
      <span class="tag">${squad.length} players · ${totalPts} pts</span></div>
    <table class="tbl"><thead><tr><th class="l">Player</th><th class="l">Pos</th><th>Price</th><th>Own%</th><th>Pts</th><th>G</th><th>A</th></tr></thead><tbody>`
    + (squad.length?squad.map(p=>`<tr><td class="l c-nm">${esc(p.name)}</td><td class="l">${posTag(p.pos)}</td>
        <td class="c-dim">${p.price?('$'+p.price+'M'):'—'}</td><td class="c-dim">${p.ownPct}%</td>
        <td class="c-tot">${p.points}</td><td>${p.goals||0}</td><td>${p.assists||0}</td></tr>`).join('')
       :`<tr><td class="l c-dim" colspan="7">No players listed.</td></tr>`)
    + `</tbody></table></div>`;
  el.querySelectorAll('.natchip').forEach(c=>c.onclick=()=>{selNation=+c.dataset.id;renderTeams(el);});
}

function renderStandings(el){
  if(!STAND || !(STAND.entries||[]).length){
    const msg = !STAND ? 'No standings.json found yet.'
      : (STAND.message || 'Standings are empty until matches begin.');
    el.innerHTML=`<div class="panel"><div class="panel-h"><span class="t">League standings</span>
      <span class="tag">status: ${esc(STAND?STAND.status:'n/a')}</span></div>
      <div class="empty">${esc(msg)}</div></div>`;
    return;
  }
  const E=STAND.entries, lead=E[0], second=E[1];
  const lead_html=`<div class="leadstrip">
    <div class="leadcell"><div class="lab">Leader</div><div class="nm">${esc(lead.managerName)}</div>
      <div class="sub">${esc(lead.teamName||'')}</div></div>
    <div class="leadcell"><div class="lab">Total</div><div class="big">${lead.points??'—'}</div></div>
    ${second?`<div class="leadcell"><div class="lab">Margin</div><div class="big up">+${(lead.points||0)-(second.points||0)}</div><div class="sub">vs #2</div></div>`:''}
    <div class="leadcell"><div class="lab">Last round</div><div class="big" style="color:var(--amber)">${lead.lastRoundPoints??'—'}</div></div>
  </div>`;
  el.innerHTML = lead_html + `<div class="panel">
    <div class="panel-h"><span class="t">League standings — ${esc(E.length)} teams</span>
      <span class="tag">fetched ${fmtDate(STAND.fetchedAt)}</span></div>
    <table class="tbl"><thead><tr><th class="l">#</th><th class="l">Manager</th><th class="l">Team</th>
      <th>Round</th><th>Total</th></tr></thead><tbody>`
    + E.map(e=>`<tr><td class="l c-rk">${String(e.rank).padStart(2,'0')}</td>
        <td class="l c-nm">${esc(e.managerName)}</td>
        <td class="l c-dim">${esc(e.teamName||'')}</td>
        <td class="c-amber">${e.lastRoundPoints??'—'}</td>
        <td class="c-tot">${e.points??'—'}</td></tr>`).join('')
    + `</tbody></table></div>`;
}

function startClock(){
  const t=()=>{const c=document.getElementById('clock');if(c)c.textContent=new Date().toLocaleTimeString('en-GB');};
  t(); setInterval(t,1000);
}

(async function(){
  try{ STATS = await buildStatsLive(); }
  catch(e){ try{ STATS = await loadJSON('stats.json'); }
    catch(e2){ document.getElementById('view').innerHTML=`<div class="err">Could not load data: ${esc(e.message)}</div>`; return; } }
  try{ STAND = await loadJSON('standings.json'); }catch{ STAND=null; }
  renderChrome(); renderNav(); renderMain(); startClock();
  window.addEventListener('keydown', ev=>{
    if(ev.target.tagName==='INPUT') return;
    const v=VIEWS.find(x=>x.k===ev.key); if(v) setView(v.id);
  });
})();
</script>
</body>
</html>
