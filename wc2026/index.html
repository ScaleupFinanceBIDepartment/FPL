<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VM 2026 Fantasy · SuF</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --purple:#601C98; --purple2:#7a22bc; --teal:#60DEC8; --mint:#D0FFF7;
    --text:#252525; --muted:#8B89B4; --bg:#FAFAFA; --card:#FFFFFF;
    --border:#DEDEDE; --green:#27C966; --yellow:#FCDF4A; --red:#FF460C;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--text);background:var(--bg);line-height:1.45}
  a{color:var(--purple)}
  .wrap{max-width:1000px;margin:0 auto;padding:0 18px 64px}
  header{background:linear-gradient(110deg,var(--purple),var(--purple2));color:#fff;padding:26px 0 30px}
  header .wrap{padding-bottom:0}
  .brand{display:flex;align-items:center;gap:12px;font-weight:800;letter-spacing:.3px;font-size:14px;opacity:.9}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--teal)}
  h1{margin:.35em 0 .15em;font-size:30px;font-weight:800}
  .sub{opacity:.85;font-size:14px}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .pill{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);padding:5px 11px;border-radius:999px;font-size:12.5px;font-weight:500}
  .pill b{font-weight:700}
  section{margin-top:30px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  h2{font-size:19px;margin:0 0 4px;font-weight:700}
  .h-note{color:var(--muted);font-size:13px;margin:0 0 16px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:hover{background:#faf8fd}
  .rank{color:var(--muted);width:28px}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;line-height:1.3}
  .pos-GK{background:#FFF3D6;color:#8a6d00}
  .pos-DEF{background:#E2F0FF;color:#0b5cad}
  .pos-MID{background:#E7F9EF;color:#0f7a3d}
  .pos-FWD{background:#FFE6DE;color:#b5310d}
  .muted{color:var(--muted)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0}
  .tabs button{border:0;background:none;padding:9px 14px;font:inherit;font-weight:600;font-size:13.5px;cursor:pointer;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1px}
  .tabs button.on{color:var(--purple);border-bottom-color:var(--purple)}
  .empty{padding:22px;text-align:center;color:var(--muted);font-size:14px;background:var(--bg);border-radius:10px}
  .err{color:var(--red)}
  .metric{font-weight:800;color:var(--purple);font-size:15px}
  footer{margin-top:40px;color:var(--muted);font-size:12.5px;text-align:center}
  .skel{color:var(--muted);font-size:14px;padding:16px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand"><span class="dot"></span> SCALEUP FINANCE · FANTASY</div>
    <h1>FIFA World Cup 2026 — Fantasy</h1>
    <div class="sub" id="leagueLine">Indlæser liga…</div>
    <div class="pills" id="pills"></div>
  </div>
</header>

<div class="wrap">

  <!-- STANDINGS -->
  <section>
    <div class="card">
      <h2>Ligastilling — <span id="leagueName">SuF</span></h2>
      <p class="h-note" id="standingsNote">Hentes automatisk fra FIFA af bot-kontoen.</p>
      <div id="standings"><div class="skel">Indlæser stilling…</div></div>
    </div>
  </section>

  <!-- LEADERBOARDS -->
  <section>
    <div class="card">
      <h2>Statistik</h2>
      <p class="h-note" id="statsNote"></p>
      <div class="tabs" id="tabs"></div>
      <div id="board"><div class="skel">Indlæser statistik…</div></div>
    </div>
  </section>

  <footer id="footer"></footer>
</div>

<script>
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const posTag = p => p?`<span class="tag pos-${p}">${p}</span>`:'';

// tab config: key in stats.leaderboards -> {label, metric column(s)}
const BOARDS = [
  {key:'topScorers',  label:'Topscorere',  cols:[['goals','Mål'],['assists','Assists']]},
  {key:'topAssists',  label:'Assists',     cols:[['assists','Assists'],['goals','Mål']]},
  {key:'topPoints',   label:'Flest point', cols:[['points','Point'],['avg','Snit'],['form','Form']]},
  {key:'mostSelected',label:'Mest valgte', cols:[['ownPct','Ejer%'],['points','Point']]},
];

let STATS=null, STAND=null, currentBoard='topScorers';

async function loadJSON(path){
  const r = await fetch(path + '?t=' + Date.now());
  if(!r.ok) throw new Error(path+': HTTP '+r.status);
  return r.json();
}
function fmtDate(iso){ if(!iso) return '—'; try{return new Date(iso).toLocaleString('da-DK',{dateStyle:'medium',timeStyle:'short'});}catch{return iso;} }

function renderHeader(){
  const m = STATS.meta;
  document.getElementById('leagueName').textContent = m.league.name;
  document.getElementById('leagueLine').textContent =
    `Liga "${m.league.name}" · ID ${m.league.id} · join-kode ${m.league.joinCode}`;
  document.getElementById('pills').innerHTML = [
    `${m.playerCount} spillere`,
    `<b>${m.matchesPlayed ?? 0}</b> kampe spillet`,
    `Opdateret <b>${fmtDate(m.generatedAt)}</b>`,
  ].map(t=>`<span class="pill">${t}</span>`).join('');
  document.getElementById('statsNote').textContent = m.note || '';
}

function renderStandings(){
  const el = document.getElementById('standings');
  const note = document.getElementById('standingsNote');
  if(!STAND){
    el.innerHTML = `<div class="empty">Ingen <code>standings.json</code> fundet endnu. Workflowet skriver den efter første kørsel.</div>`;
    return;
  }
  note.textContent = `Status: ${STAND.status||'?'} · senest hentet ${fmtDate(STAND.fetchedAt)}`
    + (STAND.message? ` · ${STAND.message}`:'');
  const rows = STAND.entries||[];
  if(!rows.length){
    el.innerHTML = `<div class="empty">Stillingen er tom (turneringen starter 11. juni 2026).<br>
      Når bot-kontoen er meldt ind og kampene begynder, vises holdene her automatisk.</div>`;
    return;
  }
  el.innerHTML = `<div style="overflow:auto"><table><thead><tr>
      <th class="rank">#</th><th>Manager</th><th>Hold</th>
      <th class="num">Runde</th><th class="num">Total</th></tr></thead><tbody>`
    + rows.map(e=>`<tr>
        <td class="rank">${esc(e.rank)}</td>
        <td>${esc(e.managerName)}</td>
        <td class="muted">${esc(e.teamName)}</td>
        <td class="num">${e.lastRoundPoints??'—'}</td>
        <td class="num"><b>${e.points??'—'}</b></td></tr>`).join('')
    + `</tbody></table></div>`;
}

function renderTabs(){
  document.getElementById('tabs').innerHTML = BOARDS.map(b=>
    `<button data-k="${b.key}" class="${b.key===currentBoard?'on':''}">${b.label}</button>`).join('');
  document.querySelectorAll('#tabs button').forEach(btn=>btn.onclick=()=>{
    currentBoard=btn.dataset.k; renderTabs(); renderBoard();
  });
}

function renderBoard(){
  const cfg = BOARDS.find(b=>b.key===currentBoard);
  const rows = (STATS.leaderboards[cfg.key])||[];
  const el = document.getElementById('board');
  if(!rows.length){
    el.innerHTML = `<div class="empty">Ingen data endnu — afventer FIFAs kampdata
      (turneringen starter ${STATS.meta.tournamentStart}).</div>`;
    return;
  }
  const head = `<th class="rank">#</th><th>Spiller</th><th>Pos</th><th>Nation</th>`
    + cfg.cols.map((c,i)=>`<th class="num">${c[1]}</th>`).join('');
  el.innerHTML = `<div style="overflow:auto"><table><thead><tr>${head}</tr></thead><tbody>`
    + rows.map((r,i)=>{
        const cells = cfg.cols.map((c,ci)=>{
          let v = r[c[0]]; if(v==null) v='—';
          if(c[0]==='ownPct') v=v+'%';
          return `<td class="num">${ci===0?`<span class="metric">${v}</span>`:v}</td>`;
        }).join('');
        return `<tr>
          <td class="rank">${i+1}</td>
          <td><b>${esc(r.name)}</b></td>
          <td>${posTag(r.pos)}</td>
          <td>${esc(r.nation)} <span class="muted">${r.group?'· '+r.group:''}</span></td>
          ${cells}</tr>`;
      }).join('')
    + `</tbody></table></div>`;
}

// ---- live stats: compute leaderboards directly from FIFA's public feeds ----
const FIFA_FEEDS='https://play.fifa.com/json/fantasy/';
const TOP_N=25;
const pname=p=>p.knownName||`${p.firstName||''} ${p.lastName||''}`.trim();
async function feed(n){const r=await fetch(FIFA_FEEDS+n+'.json');if(!r.ok)throw new Error(n+' HTTP '+r.status);return r.json();}
function topBy(rows,key,tiebreak,extra){
  return rows.filter(r=>(r[key]||0)>0)
    .sort((a,b)=>(b[key]-a[key])||((b[tiebreak]||0)-(a[tiebreak]||0)))
    .slice(0,TOP_N)
    .map(r=>{const o={id:r.id,name:r.name,nation:r.nation,nationAbbr:r.nationAbbr,group:r.group,pos:r.pos};
      extra.forEach(k=>o[k]=r[k]);return o;});
}
async function buildStatsLive(){
  const [players,squads,rounds]=await Promise.all([feed('players'),feed('squads'),feed('rounds')]);
  const sq={};squads.forEach(s=>sq[s.id]=s);
  const goals={},assists={};let played=0;
  rounds.forEach(rnd=>(rnd.tournaments||[]).forEach(m=>{
    if(m.homeScore==null&&m.awayScore==null)return;played++;
    ['homeGoalScorersAssists','awayGoalScorersAssists'].forEach(side=>(m[side]||[]).forEach(ev=>{
      if(ev.playerId)goals[ev.playerId]=(goals[ev.playerId]||0)+1;
      if(ev.assistId)assists[ev.assistId]=(assists[ev.assistId]||0)+1;
    }));
  }));
  const rows=players.filter(p=>p.status==='playing').map(p=>{
    const s=sq[p.squadId]||{},st=p.stats||{};
    return{id:p.id,name:pname(p),nation:s.name,nationAbbr:s.abbr,group:(s.group||'').toUpperCase(),pos:p.position,
      points:st.totalPoints||0,avg:st.avgPoints||0,form:st.form||0,
      ownPct:Math.round((p.percentSelected||0)*10)/10,goals:goals[p.id]||0,assists:assists[p.id]||0};
  });
  return{meta:{league:{id:128462,name:'SuF',joinCode:'2SPXEBAF'},generatedAt:new Date().toISOString(),
      dataSource:FIFA_FEEDS+'*',playerCount:rows.length,matchesPlayed:played,
      note:played?`${played} kampe spillet — live fra FIFA.`:'Turneringen er ikke startet endnu.'},
    leaderboards:{
      topScorers:topBy(rows,'goals','assists',['goals','assists']),
      topAssists:topBy(rows,'assists','goals',['assists','goals']),
      topPoints:topBy(rows,'points','avg',['points','avg','form']),
      mostSelected:topBy(rows,'ownPct','points',['ownPct','points'])}};
}

(async function(){
  try{
    STATS = await buildStatsLive();                 // live fra FIFAs offentlige feeds
  }catch(e){
    try{ STATS = await loadJSON('stats.json'); }     // fallback: committet snapshot
    catch(e2){
      document.querySelector('.wrap').insertAdjacentHTML('afterbegin',
        `<section><div class="card err">Kunne ikke hente data: ${esc(e.message)}</div></section>`);
      return;
    }
  }
  try{ STAND = await loadJSON('standings.json'); }catch{ STAND=null; }
  renderHeader(); renderStandings(); renderTabs(); renderBoard();
  document.getElementById('footer').innerHTML =
    `Data: <a href="${STATS.meta.dataSource}">play.fifa.com</a> · `
    + `genereret ${fmtDate(STATS.meta.generatedAt)}.`;
})();
</script>
</body>
</html>
